name: build-push-deploy

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to deploy (default: current commit sha12)"
        required: false
        type: string

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, prod]
    environment: prod
    permissions:
      contents: read
    env:
      ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
      IMAGE_REPO: registry.cn-hangzhou.aliyuncs.com/kip-app/kip-provider
      KIP_SHARED_ROOT: /home/xiaoshichuan/kip-shared/kip
      KIP_NAMESPACE: kip-poc
      KIP_NACOS_ADDR: 10.42.0.125:8848
      KIP_NACOS_ADMIN_ADDR: 10.42.0.125:8080
      KIP_NACOS_USER: nacos
      KIP_NACOS_PASS: nacos8848
      KIP_NACOS_NAMESPACE: 74a3fe73-35c1-474e-ade8-9bc460b3f398
      KIP_NACOS_GROUP: K8S_POC
      DOCKER_BUILDKIT: "1"
      BUILDKIT_PROGRESS: plain

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Baseline check
        shell: bash
        run: |
          set -euo pipefail
          "${KIP_SHARED_ROOT}/scripts/shared/check-kip-baseline.sh"

      - name: Resolve image variables
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            IMAGE_TAG="${IMAGE_TAG_INPUT}"
          else
            IMAGE_TAG="${GITHUB_SHA::12}"
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE=${IMAGE_REPO}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Docker login to ACR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login "${ACR_REGISTRY}" -u "${{ secrets.ALIYUN_REGISTRY_USERNAME }}" --password-stdin

      - name: Prepare kip-open-common for docker build
        shell: bash
        run: |
          set -euo pipefail
          DEP_DIR="$HOME/.m2/repository/xyz/kip/kip-open-common/1.0-SNAPSHOT"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom"

          mkdir -p deps
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar" deps/
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom" deps/
          ls -lh deps/

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build --progress=plain -t "${FULL_IMAGE}" .

      - name: Push image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${FULL_IMAGE}"

      - name: Capture previous deployment image
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_IMAGE=""
          if kubectl -n "${KIP_NAMESPACE}" get deployment kip-provider >/dev/null 2>&1; then
            CURRENT_IMAGE="$(kubectl -n "${KIP_NAMESPACE}" get deployment kip-provider -o jsonpath='{.spec.template.spec.containers[0].image}')"
          fi
          echo "PREV_IMAGE=${CURRENT_IMAGE}" >> "$GITHUB_ENV"

      - name: Sync Nacos config
        shell: bash
        run: |
          set -euo pipefail
          if ! "${KIP_SHARED_ROOT}/scripts/shared/publish-nacos-config.sh" verify kip-provider deploy/k8s/nacos/kip-provider-k8s.yml; then
            "${KIP_SHARED_ROOT}/scripts/shared/publish-nacos-config.sh" put kip-provider deploy/k8s/nacos/kip-provider-k8s.yml
            "${KIP_SHARED_ROOT}/scripts/shared/publish-nacos-config.sh" verify kip-provider deploy/k8s/nacos/kip-provider-k8s.yml
          fi

      - name: Render K8s runtime manifests
        shell: bash
        env:
          MYSQL_URL: ${{ secrets.MYSQL_URL }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          set -euo pipefail
          RENDERED_DIR="$(mktemp -d)"
          scripts/k8s/render-manifests.sh deploy/k8s "${RENDERED_DIR}" "${IMAGE_TAG}"
          echo "RENDERED_DIR=${RENDERED_DIR}" >> "$GITHUB_ENV"

      - name: Apply K8s config
        shell: bash
        run: |
          set -euo pipefail
          kubectl get namespace "${KIP_NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${KIP_NAMESPACE}"

          if [ ! -f "${RENDERED_DIR}/secret.yaml" ]; then
            kubectl -n "${KIP_NAMESPACE}" get secret kip-provider-secret >/dev/null
          fi

          for manifest in configmap.yaml secret.yaml service.yaml deployment.yaml; do
            if [ -f "${RENDERED_DIR}/${manifest}" ]; then
              kubectl -n "${KIP_NAMESPACE}" apply -f "${RENDERED_DIR}/${manifest}"
            fi
          done

      - name: Roll out provider
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${KIP_NAMESPACE}" set image deployment/kip-provider kip-provider="${FULL_IMAGE}"
          kubectl -n "${KIP_NAMESPACE}" rollout status deployment/kip-provider --timeout=5m

      - name: Provider smoke verification
        shell: bash
        run: |
          set -euo pipefail
          scripts/k8s/smoke-provider.sh

      - name: Roll back on failure
        if: failure() && env.PREV_IMAGE != ''
        shell: bash
        run: |
          set -euo pipefail
          echo "Rolling back kip-provider to ${PREV_IMAGE}"
          kubectl -n "${KIP_NAMESPACE}" set image deployment/kip-provider kip-provider="${PREV_IMAGE}"
          kubectl -n "${KIP_NAMESPACE}" rollout status deployment/kip-provider --timeout=5m
          scripts/k8s/smoke-provider.sh

      - name: Docker logout
        if: always()
        shell: bash
        run: docker logout "${ACR_REGISTRY}" || true
