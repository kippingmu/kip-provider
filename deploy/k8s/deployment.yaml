apiVersion: apps/v1
kind: Deployment
metadata:
  name: kip-provider
  labels:
    app: kip-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kip-provider
  template:
    metadata:
      labels:
        app: kip-provider
    spec:
      imagePullSecrets:
        - name: kip-acr-pull
      containers:
        - name: kip-provider
          # Rendered at deploy time with the Git SHA tag.
          image: registry.cn-hangzhou.aliyuncs.com/kip-app/kip-provider:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6001
          envFrom:
            - configMapRef:
                name: kip-provider-config
            - secretRef:
                name: kip-provider-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 60
