server:
  port: 6001

spring:
  cloud:
    service-registry:
      auto-registration:
        enabled: false
    nacos:
      discovery:
        enabled: false
        register-enabled: false
    sentinel:
      enabled: false
    alibaba:
      seata:
        enabled: false
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

logging:
  level:
    root: info
  file:
    path: /tmp/kip-provider/logs
  kafka:
    topic: ${LOGGING_KAFKA_TOPIC:kip-provider-log-k8s}

management:
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
    export:
      zipkin:
        endpoint: ${MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT:http://10.42.0.125:9411/api/v2/spans}
