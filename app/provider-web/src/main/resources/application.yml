server:
  shutdown: graceful

spring:
  application:
    name: kip-provider
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=${NACOS_GROUP:K8S_POC}&refreshEnabled=true
  cloud:
    service-registry:
      auto-registration:
        enabled: ${NACOS_AUTO_REGISTRATION_ENABLED:false}
    alibaba:
      seata:
        tx-service-group: default_tx_group
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:10.42.0.125:8848}
        namespace: ${NACOS_NAMESPACE:74a3fe73-35c1-474e-ade8-9bc460b3f398}
        group: ${NACOS_GROUP:K8S_POC}
        file-extension: yaml
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:10.42.0.125:8848}
        namespace: ${NACOS_NAMESPACE:74a3fe73-35c1-474e-ade8-9bc460b3f398}
        group: ${NACOS_GROUP:K8S_POC}
        register-enabled: ${NACOS_REGISTER_ENABLED:false}
        ip-delete-timeout: 30000
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:10.42.0.125:8090}
        port: ${SENTINEL_PORT:8090}
      web-context-unify: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:10.42.0.125:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      compression-type: lz4
      batch-size: 32768
      properties:
        linger.ms: 100
        max.request.size: 1048576

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:10.42.0.125:9876}

seata:
  config:
    type: nacos
    nacos:
      server-addr: ${SEATA_NACOS_SERVER_ADDR:${NACOS_SERVER_ADDR:10.42.0.125:8848}}
      group: ${SEATA_GROUP:SEATA_GROUP}
      data-id: ${SEATA_CONFIG_DATA_ID:seataServer.properties}
  registry:
    type: nacos
    nacos:
      application: ${SEATA_APPLICATION:seata-server}
      server-addr: ${SEATA_NACOS_SERVER_ADDR:${NACOS_SERVER_ADDR:10.42.0.125:8848}}
      group: ${SEATA_GROUP:SEATA_GROUP}
      cluster: ${SEATA_CLUSTER:default}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: xyz.kip.provider.dal.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  config: classpath:log4j2-spring.xml
  file:
    path: logs
  level:
    root: info
    org.springframework: warn
    org.apache.ibatis: warn
    org.mybatis: warn
  kafka:
    bootstrap-servers: ${LOGGING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:10.42.0.125:9092}}
    topic: ${LOGGING_KAFKA_TOPIC:kip-provider-log}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

kip:
  shutdown:
    propagation-wait: 5s
    inflight-wait: 30s
    force-stop-wait: 5s
    request-reject-status: 503
    request-reject-message: service is draining
