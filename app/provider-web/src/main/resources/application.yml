server:
  shutdown: graceful

spring:
  application:
    name: kip-provider
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    alibaba:
      seata:
        tx-service-group: default_tx_group
    nacos:
      config:
        server-addr: 10.42.0.125:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
      discovery:
        server-addr: 10.42.0.125:8848
        namespace: public
        group: DEFAULT_GROUP
        register-enabled: true
        ip-delete-timeout: 30000
    sentinel:
      transport:
        dashboard: 10.42.0.125:8090
        port: 8090
      web-context-unify: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  kafka:
    bootstrap-servers: 10.42.0.125:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      compression-type: lz4
      batch-size: 32768
      properties:
        linger.ms: 100
        max.request.size: 1048576

rocketmq:
  name-server: 10.42.0.125:9876

seata:
  config:
    type: nacos
    nacos:
      server-addr: 10.42.0.125:8848
      group: SEATA_GROUP
      data-id: seataServer.properties
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: 10.42.0.125:8848
      group: SEATA_GROUP
      cluster: default

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: xyz.kip.provider.dal.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  config: classpath:log4j2-spring.xml
  file:
    path: logs
  level:
    root: info
    org.springframework: warn
    org.apache.ibatis: warn
    org.mybatis: warn
  kafka:
    bootstrap-servers: 10.42.0.125:9092
    topic: kip-provider-log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

kip:
  shutdown:
    propagation-wait: 5s
    inflight-wait: 30s
    force-stop-wait: 5s
    request-reject-status: 503
    request-reject-message: service is draining
